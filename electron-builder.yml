appId: com.hanumoka.zm-agent-manager
productName: zm-agent-manager
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,vitest.config.ts,components.json}'
  - '!{docs,mock}/**/*'
asarUnpack:
  - resources/**
win:
  target:
    - nsis
  artifactName: ${name}-${version}-win.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - universal
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}-mac-universal.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: hanumoka
  category: Utility
appImage:
  artifactName: ${name}-${version}-linux.${ext}
npmRebuild: false
publish:
  provider: github
  owner: hanumoka
  repo: zm-agent-manager
